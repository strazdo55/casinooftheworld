<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found | Casino of the World</title>
  <script>
    (function () {
      var path = location.pathname.replace(/\/$/, "");
      var m = path.match(/\/([a-z0-9-]+)$/);
      if (!m || m[1] === "index" || m[1] === "blog") return;
      var slug = m[1];
      var parts = location.pathname.split("/").filter(Boolean);
      var ghIdx = parts.indexOf("casinooftheworld");
      var prefix =
        ghIdx >= 0 ? "/" + parts.slice(0, ghIdx + 1).join("/") : "";
      location.replace(prefix + "/blog/" + slug + "/" + location.search + location.hash);
    })();
  </script>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body style="padding:3rem;text-align:center;font-family:system-ui,sans-serif">
  <h1>404 — Page not found</h1>
  <p><a href="/">Home</a> · <a href="/blog/">Casino blog</a></p>
</body>
</html>
